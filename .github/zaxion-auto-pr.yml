name: Zaxion AI Auto-PR

on:
  push:
    branches:
      - main  # ระบบจะรันอัตโนมัติเมื่อคุณ Push งานขึ้นกิ่ง main

jobs:
  create-pull-request:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_TOKEN }} # อย่าลืมไปสร้าง GH_TOKEN ใน Settings นะครับ
          commit-message: "feat: automated update verified by Zaxion AI"
          title: "[Zaxion] Thai Translation & Security Audit"
          body: |
            This PR was automatically generated by Zaxion AI.
            - Author: Pum482930
            - Verified via Vercel AI Gateway
            - Team: pm-3f2fe7fa
          branch: zaxion-updates
          base: main # ระบุกิ่งของ "โครงการหลัก" ที่คุณต้องการส่ง PR ไปหา
