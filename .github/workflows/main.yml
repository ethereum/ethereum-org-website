Name: CI-Thai-Translation-Check

on:
  push:
    branches: [ "dev", "Pum482930-patch-1" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Formatting (Prettier)
        run: npx prettier --check "src/content/translations/th/**/*.{md,json}"

      - name: Build Test
        run: npm run build
