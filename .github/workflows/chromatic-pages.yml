# Playwright + Chromatic full-page visual regression tests
# Separate from chromatic.yml (Storybook component snapshots)
name: "Chromatic: Page Visual Tests"

on:
  pull_request:
    branches: [dev, master, staging]
    types: [opened, synchronize, ready_for_review]

jobs:
  playwright-visual:
    name: Build & Capture Snapshots
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.53.0-noble
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build Next.js with mock data (English only)
        run: pnpm build
        env:
          USE_MOCK_DATA: "true"
          NEXT_PUBLIC_BUILD_LOCALES: "en"

      - name: Run visual tests
        run: pnpm test:visual
        env:
          HOME: /root
          USE_MOCK_DATA: "true"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chromatic-archives
          path: test-results/
          retention-days: 1

  chromatic-upload:
    name: Upload to Chromatic
    needs: playwright-visual
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: chromatic-archives
          path: test-results/

      - name: Publish to Chromatic
        uses: chromaui/action@v1
        with:
          projectToken: ${{ secrets.CHROMATIC_PAGES_TOKEN }}
          playwright: true
          exitZeroOnChanges: true
