name: Branch Task

on:
  workflow_dispatch:

jobs:
  generate-translations:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          ref: glossary-term-extraction

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate glossary translations
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npx tsx scripts/generate-translations-sdk.ts

      - name: Final commit and push
        run: |
          git add scripts/translations/
          if git diff --staged --quiet; then
            echo "No new translations to commit"
          else
            git commit -m "data: glossary translations (final batch)

          Co-Authored-By: Gemini <noreply@google.com>"
            git push
          fi
