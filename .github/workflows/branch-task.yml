name: Branch Task

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  review-fixes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install
      - name: Translate review-flagged fixes
        run: npx ts-node -O '{"module":"commonjs"}' ./src/scripts/intl-pipeline/fill-review-fixes.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_API_TOKEN: ${{ secrets.I18N_GITHUB_TOKEN }}
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/content/translations
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "i18n: translate review-flagged Card titles + fix ta cross-script"
            git push origin HEAD:${{ github.ref_name }}
          fi
