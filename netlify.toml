# Settings in the [build] context are global and are applied to all contexts
# unless otherwise overridden by more specific contexts.
[build]
  # Directory (relative to root of your repo) that contains the deploy-ready
  # HTML files and assets generated by the build. If a base directory has
  # been specified, include it in the publish directory path.
  publish = ".next"

  # Default build command.
  # Remove .next/cache after build to free ~4GB of webpack cache before the
  # Netlify plugin copies static assets. Next.js 16 per-page output is ~30%
  # larger than Next.js 14 (.segments trees, RSC payloads), leaving little
  # headroom on the build VM. The cache is only useful for incremental builds
  # which don't apply on Netlify (each build starts fresh).
  command = "pnpm build && rm -rf .next/cache"

[build.environment]
  NEXT_FORCE_EDGE_IMAGES="true"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://esp.ethereum.foundation"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[plugins]]
  package = "@netlify/plugin-lighthouse"

  [[plugins.inputs.audits]]
    path = "en/"
  [[plugins.inputs.audits]]
    path = "en/wallets/find-wallet/"
  [[plugins.inputs.audits]]
    path = "en/staking/"
  [[plugins.inputs.audits]]
    path = "en/whitepaper/"
  [[plugins.inputs.audits]]
    path = "en/nft/"
  [[plugins.inputs.audits]]
    path = "en/developers/docs/intro-to-ethereum/"
  [[plugins.inputs.audits]]
    path = "en/developers/tutorials/creating-a-wagmi-ui-for-your-contract/"

[functions]
  # PoC(hybrid): MDX bodies are compiled at request time (legacy
  # next-mdx-remote path inside getPageData). For ISR revalidation and
  # on-demand renders to work, the raw markdown files must ship in the
  # function bundle.
  #
  # Bundling every locale's translations costs ~154 MB unzipped and
  # tips the function over Netlify's 250 MB unzipped limit. We bundle
  # only the locales listed below; locales outside this set 404 on
  # on-demand renders (their static prerenders, when present, are
  # served by the CDN without touching the function).
  #
  # Keep this list in sync with NEXT_PUBLIC_PRERENDER_LOCALES.
  included_files = [
    "i18n.config.json",
    "src/intl/**/*",
    "src/data-layer/mocks/**/*",
    ".source/manifest.json",
    # English content (everything under public/content except translations/).
    "public/content/!(translations)/**/*.md",
    "public/content/!(translations)/**/*.mdx",
    # Only the locales we render on-demand. Brace expansion + extglob
    # are supported by minimatch (Netlify's glob library).
    "public/content/translations/{en,es,zh,de}/**/*.md",
    "public/content/translations/{en,es,zh,de}/**/*.mdx",
  ]

# Override SITE_URL for named branches with custom subdomains so canonical
# URLs and OG metadata use the custom domain instead of *.netlify.app.
[context.dev.environment]
  NEXT_PUBLIC_SITE_URL = "https://dev.ethereum.org"

[context.staging.environment]
  NEXT_PUBLIC_SITE_URL = "https://staging.ethereum.org"
