# Settings in the [build] context are global and are applied to all contexts
# unless otherwise overridden by more specific contexts.
[build]
  # Directory (relative to root of your repo) that contains the deploy-ready
  # HTML files and assets generated by the build. If a base directory has
  # been specified, include it in the publish directory path.
  publish = ".next"

  # Default build command.
  command = "pnpm build"

[build.environment]
  NEXT_FORCE_EDGE_IMAGES="true"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://esp.ethereum.foundation"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[plugins]]
  package = "@netlify/plugin-lighthouse"

  [[plugins.inputs.audits]]
    path = "en/"
  [[plugins.inputs.audits]]
    path = "en/wallets/find-wallet/"
  [[plugins.inputs.audits]]
    path = "en/staking/"
  [[plugins.inputs.audits]]
    path = "en/whitepaper/"
  [[plugins.inputs.audits]]
    path = "en/nft/"
  [[plugins.inputs.audits]]
    path = "en/developers/docs/intro-to-ethereum/"
  [[plugins.inputs.audits]]
    path = "en/developers/tutorials/creating-a-wagmi-ui-for-your-contract/"

[functions]
  included_files = ["i18n.config.json", "src/intl/**/*", "src/data-layer/mocks/**/*"]

# SEO: Prevent search engines from indexing non-production deploys
# X-Robots-Tag HTTP header for branch deploys, deploy previews, and named branches
[[context.branch-deploy.headers]]
  for = "/*"
  [context.branch-deploy.headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[context.deploy-preview.headers]]
  for = "/*"
  [context.deploy-preview.headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[context.dev.headers]]
  for = "/*"
  [context.dev.headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[context.staging.headers]]
  for = "/*"
  [context.staging.headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Set NEXT_PUBLIC_SITE_URL per branch so canonical URLs and noindex
# meta tags resolve correctly at build time.
[context.dev.environment]
  NEXT_PUBLIC_SITE_URL = "https://dev.ethereum.org"

[context.staging.environment]
  NEXT_PUBLIC_SITE_URL = "https://staging.ethereum.org"
