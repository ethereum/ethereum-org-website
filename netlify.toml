# Settings in the [build] context are global and are applied to all contexts
# unless otherwise overridden by more specific contexts.
[build]
  # Directory (relative to root of your repo) that contains the deploy-ready
  # HTML files and assets generated by the build. If a base directory has
  # been specified, include it in the publish directory path.
  publish = ".next"

  # Default build command.
  # Remove .next/cache after build to free ~4GB of webpack cache before the
  # Netlify plugin copies static assets. Next.js 16 per-page output is ~30%
  # larger than Next.js 14 (.segments trees, RSC payloads), leaving little
  # headroom on the build VM. The cache is only useful for incremental builds
  # which don't apply on Netlify (each build starts fresh).
  #
  # PoC(fumadocs): recon block prints the actual container limits, then a
  # background sampler logs RSS every 15 s so the OOM moment in the log can
  # be matched to a build phase (compile / collecting page data /
  # generating static pages). `--experimental-debug-memory-usage` adds
  # Next.js-side heap/GC reporting throughout. Remove the instrumentation
  # once the OOM is resolved.
  command = """
echo '=== BUILD ENV RECON ===' && \
echo '-- /proc/meminfo --' && grep -E '^(MemTotal|MemAvailable|SwapTotal):' /proc/meminfo && \
echo '-- CPUs --' && nproc && \
echo '-- cgroup memory.max --' && (cat /sys/fs/cgroup/memory.max 2>/dev/null || cat /sys/fs/cgroup/memory/memory.limit_in_bytes 2>/dev/null || echo unknown) && \
echo '-- cgroup cpu.max --' && (cat /sys/fs/cgroup/cpu.max 2>/dev/null || echo unknown) && \
echo '-- ulimit -v (KB) --' && ulimit -v && \
echo '-- ulimit -a --' && ulimit -a && \
echo '-- NODE_OPTIONS --' && echo "${NODE_OPTIONS:-(unset)}" && \
echo '-- free -h --' && free -h && \
echo '=== /BUILD ENV RECON ===' && \
BUILD_START=$(date +%s) ; \
( while sleep 15; do T=$(( $(date +%s) - BUILD_START )); free -m | awk -v t=$T '/^Mem:/ {printf "[mem t=%ds] used=%dMB free=%dMB avail=%dMB\\n", t, $3, $4, $7}'; ps -eo pid,rss,comm --sort=-rss --no-headers | head -5 | awk '{printf "[top] pid=%s rss=%dMB %s\\n", $1, $2/1024, $3}'; done ) & SAMPLER=$! ; \
trap "kill $SAMPLER 2>/dev/null" EXIT ; \
pnpm exec next build --experimental-debug-memory-usage ; BUILD_EXIT=$? ; \
kill $SAMPLER 2>/dev/null ; \
rm -rf .next/cache ; \
exit $BUILD_EXIT
"""

[build.environment]
  NEXT_FORCE_EDGE_IMAGES="true"
  # PoC(fumadocs): now attempting full 25 locales with the Tier-1 memory
  # mitigations applied (Sentry sourcemaps off, TS check off,
  # serverSourceMaps off, cpus=1, V8 heap reined in below cgroup ceiling).
  # See docs/poc/PROGRESS.md "Memory budget".
  NEXT_PUBLIC_BUILD_LOCALES="en,ar,bn,cs,de,es,fr,hi,id,it,ja,ko,mr,pl,pt-br,ru,sw,ta,te,tr,uk,ur,vi,zh,zh-tw"
  # Force single-CPU static-page generation so peak parallel render memory
  # is one page at a time. Tradeoff: longer wall time, lower peak RSS.
  LIMIT_CPUS = "1"
  # Cap V8 heap at 8 GB inside the ~10.7 GB cgroup. Leaves ~2.5 GB
  # headroom for native (Turbopack Rust workers, Sharp, worker children).
  # Netlify's auto-setting of 10240 lets V8 alone fill the container,
  # which makes any native alloc the SIGKILL trigger. Smaller semi-space
  # forces more frequent young-gen GC, keeping RSS flatter.
  NODE_OPTIONS = "--max-old-space-size=8192 --max-semi-space-size=64"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://esp.ethereum.foundation"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[plugins]]
  package = "@netlify/plugin-lighthouse"

  [[plugins.inputs.audits]]
    path = "en/"
  [[plugins.inputs.audits]]
    path = "en/wallets/find-wallet/"
  [[plugins.inputs.audits]]
    path = "en/staking/"
  [[plugins.inputs.audits]]
    path = "en/whitepaper/"
  [[plugins.inputs.audits]]
    path = "en/nft/"
  [[plugins.inputs.audits]]
    path = "en/developers/docs/intro-to-ethereum/"
  [[plugins.inputs.audits]]
    path = "en/developers/tutorials/creating-a-wagmi-ui-for-your-contract/"

[functions]
  included_files = ["i18n.config.json", "src/intl/**/*", "src/data-layer/mocks/**/*"]

# Override SITE_URL for named branches with custom subdomains so canonical
# URLs and OG metadata use the custom domain instead of *.netlify.app.
[context.dev.environment]
  NEXT_PUBLIC_SITE_URL = "https://dev.ethereum.org"

[context.staging.environment]
  NEXT_PUBLIC_SITE_URL = "https://staging.ethereum.org"
